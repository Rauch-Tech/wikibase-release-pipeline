name: 🔒 Secrets Hygiene

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  block-sensitive-files:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Block tracked key/keystore files
        shell: bash
        run: |
          set -euo pipefail

          forbidden='(\.pem|\.key|\.pfx|\.p12|\.jks|\.keystore|\.kdbx|\.pkcs12|\.der|\.csr)$|(^|/)id_rsa$|(^|/)id_ed25519$'
          matches="$(git ls-files | grep -E "$forbidden" || true)"

          if [ -n "$matches" ]; then
            echo "Tracked sensitive file(s) detected:"
            echo "$matches"
            echo "Remove these files from git and store them in a secret manager/vault."
            exit 1
          fi

  scan-for-secrets:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan git history and content for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
